# SCA: npm audit 依存関係スキャン
# workflow_dispatch で手動実行。推奨プラン（Issue #82）
name: SCA (npm audit)

on:
  workflow_dispatch: {}

jobs:
  sca:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: |
          npm audit --json > sca-report.json 2>&1 || true

      - name: Upload SCA Report
        uses: actions/upload-artifact@v4
        with:
          name: sca-report-${{ github.run_number }}
          path: sca-report.json
